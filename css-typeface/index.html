      <!-- 
      div.cell*40

      result:
      40 divs with calls of cell
      <div class="cell"></div>

      div.cell#a$*40

      40 divs with class of cell
      <div class="cell" id="a1"></div>

      div.cell#a$*40{$}

      <div class="cell" id+"a1">1</div>
      -->
